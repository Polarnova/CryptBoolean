name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
      - name: Verify normalized weight-sixteen candidates
        if: runner.os == 'Linux'
        timeout-minutes: 2
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=TERM --kill-after=10s 90s \
            python3 scripts/generate_normalized_weight_sixteen_candidates.py \
              --check CryptBoolean/Carlet/Chapter04/HigherOrderOrderTwoWeightSixteen/NormalizedCandidates.lean \
              --timeout-seconds 60 \
            2>&1 | tail -c 8192
      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false
      - name: Require the latest precompiled FABL release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/scripts/require_latest_fabl_release.sh
      - name: Restore CryptBoolean build cache
        uses: actions/cache@v6
        with:
          path: .lake/build
          key: cryptboolean-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            cryptboolean-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-
      - name: Build CryptBoolean
        run: lake build CryptBoolean
      - name: Forbidden token audit
        run: ./.github/scripts/forbidden_tokens.sh
      - name: Axiom audit
        run: ./.github/scripts/audit_axioms.sh
      - name: Fetch Mathlib cache for Blueprint
        working-directory: blueprint-verso
        run: lake exe cache get
      - name: Restore Blueprint dependency build cache
        uses: actions/cache@v6
        with:
          path: |
            .lake/packages/LeanSearchClient/.lake/build
            .lake/packages/MD4Lean/.lake/build
            .lake/packages/Qq/.lake/build
            .lake/packages/VersoBlueprint/.lake/build
            .lake/packages/aesop/.lake/build
            .lake/packages/batteries/.lake/build
            .lake/packages/illuminate/.lake/build
            .lake/packages/importGraph/.lake/build
            .lake/packages/plausible/.lake/build
            .lake/packages/proofwidgets/.lake/build
            .lake/packages/subverso/.lake/build
            .lake/packages/verso/.lake/build
            .lake/packages/verso-slides/.lake/build
          key: blueprint-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json') }}
      - name: Restore Blueprint project build cache
        uses: actions/cache@v6
        with:
          path: blueprint-verso/.lake/build
          key: blueprint-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            blueprint-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json', 'lake-manifest.json') }}-
      - name: Build and validate Verso Blueprint
        working-directory: blueprint-verso
        run: ./scripts/site.sh build release
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: blueprint-verso/_out/site/html-multi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
