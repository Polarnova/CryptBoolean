name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build-args: CryptBoolean
      - name: Forbidden token audit
        run: ./scripts/forbidden_tokens.sh
      - name: Axiom audit
        run: ./scripts/audit_axioms.sh
      - name: Fetch Mathlib cache for Blueprint
        working-directory: blueprint-verso
        run: lake exe cache get
      - name: Build and validate Verso Blueprint
        working-directory: blueprint-verso
        run: ./scripts/site.sh build
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint-verso/_out/site/html-multi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
