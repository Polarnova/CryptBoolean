name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string
      verify_only:
        description: Verify an already-published immutable release without rebuilding or publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Validate release version
        id: version
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version_pattern='^[[:space:]]*version := v!"[^"]+"[[:space:]]*$'
          test "$(grep -Ec "$version_pattern" lakefile.lean)" -eq 1
          package_version="$(sed -n 's/^[[:space:]]*version := v!"\([^"]*\)"[[:space:]]*$/\1/p' lakefile.lean)"
          test "$REQUESTED_TAG" = "v$package_version"
          git rev-parse --verify "refs/tags/$REQUESTED_TAG"
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

  prove:
    needs: prepare
    if: github.event_name == 'push' || inputs.verify_only != true
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Restore CryptBoolean build cache
        id: cryptboolean-cache
        uses: actions/cache/restore@v6
        with:
          path: .lake/build
          key: cryptboolean-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.lean', 'CryptBoolean.lean', 'CryptBoolean/**/*.lean') }}
          restore-keys: |
            cryptboolean-${{ runner.os }}-${{ runner.arch }}-

      - name: Build release library as a dependency
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/cryptboolean-release-builder"
          ./.github/scripts/prepare_release_builder.sh "$consumer_dir"
          lake --wfail --no-cache -d="$consumer_dir" build CryptBoolean

      - name: Audit release proofs
        run: |
          ./.github/scripts/forbidden_tokens.sh
          ./.github/scripts/audit_axioms.sh \
            "$RUNNER_TEMP/cryptboolean-release-builder"

      - name: Save CryptBoolean build cache
        if: steps.cryptboolean-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .lake/build
          key: ${{ steps.cryptboolean-cache.outputs.cache-primary-key }}

      - name: Pack portable proof archive
        run: |
          set -euo pipefail
          lake pack
          shopt -s nullglob
          archives=(.lake/CryptBoolean-*.tar.gz)
          test "${#archives[@]}" -eq 1
          if tar -tzf "${archives[0]}" |
              grep -E '\.(o|a|dylib|dll|so(\.[0-9]+)*)$'; then
            echo "::error::CryptBoolean proof archive contains native artifacts"
            exit 1
          fi
          mkdir -p proof-dist
          cp "${archives[0]}" proof-dist/

      - name: Preserve the verified proof archive
        uses: actions/upload-artifact@v7
        with:
          name: cryptboolean-proof-seed
          path: proof-dist/CryptBoolean-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error
          retention-days: 1

  pack:
    needs:
      - prepare
      - prove
    if: github.event_name == 'push' || inputs.verify_only != true
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Collect the verified proof archive
        uses: actions/download-artifact@v8
        with:
          name: cryptboolean-proof-seed
          path: proof-seed

      - name: Unpack the verified proof archive
        run: |
          set -euo pipefail
          archive="proof-seed/CryptBoolean-x86_64-unknown-linux-gnu.tar.gz"
          test -f "$archive"
          lake unpack "$archive"

      - name: Validate the proof archive as a dependency
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/cryptboolean-release-builder"
          ./.github/scripts/prepare_release_builder.sh "$consumer_dir"
          lake --rehash --no-build -d="$consumer_dir" build CryptBoolean

      - name: Audit packed release proofs
        run: |
          ./.github/scripts/forbidden_tokens.sh
          ./.github/scripts/audit_axioms.sh \
            "$RUNNER_TEMP/cryptboolean-release-builder"

      - name: Pack Lake release archive
        run: |
          set -euo pipefail
          lake pack
          shopt -s nullglob
          archives=(.lake/CryptBoolean-*.tar.gz)
          test "${#archives[@]}" -eq 1
          mkdir -p release-dist
          cp "${archives[0]}" release-dist/

      - name: Preserve the platform archive until publication
        uses: actions/upload-artifact@v7
        with:
          name: cryptboolean-release-${{ matrix.runner }}
          path: release-dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs:
      - prepare
      - pack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Collect both platform archives
        uses: actions/download-artifact@v8
        with:
          pattern: cryptboolean-release-*
          path: release-dist
          merge-multiple: true

      - name: Publish one immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-dist/CryptBoolean-*.tar.gz)
          test "${#assets[@]}" -eq 2
          test "$(printf '%s\n' "${assets[@]}" | grep -Ec '/CryptBoolean-x86_64-unknown-linux-gnu\.tar\.gz$')" -eq 1
          test "$(printf '%s\n' "${assets[@]}" | grep -Ec '/CryptBoolean-arm64-apple-darwin.*\.tar\.gz$')" -eq 1
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists; published releases and assets are immutable"
            exit 1
          fi
          gh release create "$TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "CryptBoolean $TAG" \
            --generate-notes \
            --latest

  verify:
    needs:
      - prepare
      - publish
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      (
        needs.publish.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.verify_only)
      )
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Consume the published release archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/cryptboolean-release-consumer"
          mkdir -p "$consumer_dir"
          cp lean-toolchain "$consumer_dir/lean-toolchain"
          {
            echo 'name = "CryptBooleanReleaseConsumer"'
            echo 'version = "0.0.0"'
            echo
            echo '[[require]]'
            echo 'name = "CryptBooleanFunction"'
            echo 'git = "https://github.com/Polarnova/CryptBoolean.git"'
            printf 'rev = "%s"\n' "$TAG"
            echo
            echo '[[lean_lib]]'
            echo 'name = "CryptBooleanReleaseConsumer"'
          } > "$consumer_dir/lakefile.toml"
          printf '%s\n' \
            'import CryptBoolean' \
            '' \
            '#check CryptBoolean.reedMuller' \
            '#check CryptBoolean.nonlinearity' \
            '#check CryptBoolean.higherOrderNonlinearity' \
            > "$consumer_dir/CryptBooleanReleaseConsumer.lean"
          lake -d="$consumer_dir" update
          lake -d="$consumer_dir" exe cache get
          ./.github/scripts/require_latest_fabl_release.sh "$consumer_dir"
          lake -d="$consumer_dir" build @CryptBooleanFunction:release
          "$consumer_dir/.lake/packages/CryptBooleanFunction/scripts/verify_release.sh" \
            "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build \
            @CryptBooleanFunction/CryptBoolean
          lake -d="$consumer_dir" build CryptBooleanReleaseConsumer
