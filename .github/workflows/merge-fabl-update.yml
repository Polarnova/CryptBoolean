name: Merge FABL Update

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-fabl-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Locate an eligible FABL update
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          pr="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/pulls" \
            --jq '[.[] | select(
              .state == "open" and
              .base.ref == "main" and
              (.head.ref | startswith("comet-fabl-v")) and
              any(.labels[]; .name == "dependencies")
            )][0].number // empty')"
          if [[ -z "$pr" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "eligible=true"
            echo "pr=$pr"
          } >> "$GITHUB_OUTPUT"

      - name: Merge the validated update
        if: steps.candidate.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.candidate.outputs.pr }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label needs-fix 2>/dev/null || true
          gh pr merge "$PR" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch \
            --subject "chore: update FABL release"

      - name: Mark a merge failure for repair
        if: failure() && steps.candidate.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.candidate.outputs.pr }}
        run: gh pr edit "$PR" --repo "$GITHUB_REPOSITORY" --add-label needs-fix
