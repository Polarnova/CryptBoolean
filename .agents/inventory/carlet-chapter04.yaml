  - id: carlet-4-rodier-pair-characteristic-moments
    kind: lemma
    location: Project bridge for Rodier Lemma 6.4
    statement: >-
      For distinct Walsh characters chi_S and chi_T and real t,r, the joint
      characteristic function of the corresponding raw Walsh coefficients is
      the product over x of cos(t*chi_S(x)+r*chi_T(x)). The sums of the squares
      and fourth powers of these phases are respectively
      2^n*(t^2+r^2) and 2^n*(t^4+6*t^2*r^2+r^4).
    formal_status: formalized
    declarations:
      - CryptBoolean.rodierPairPhase
      - CryptBoolean.rodierPairCharacteristic
      - CryptBoolean.rodierPairCharacteristic_eq_prod_cos
      - CryptBoolean.sum_monomial_mul_eq_zero_of_ne
      - CryptBoolean.sum_rodierPairPhase_sq
      - CryptBoolean.sum_rodierPairPhase_fourth
    references: [306]
    dependencies: []

