      on its Hamming weight w and equals the inverse finite Fourier sum
      2^(-2^n) sum_j K_j^(2^n)(w)(2^n-2j)^(2k). Hence the order-two
      correlation moment is an exact character sum grouped by dual-word
      Hamming weight.
