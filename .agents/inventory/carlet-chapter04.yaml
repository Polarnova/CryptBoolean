  - id: carlet-4-higher-order-counting-criterion
    kind: lemma
    location: Project bridge for Carlet, p. 54
    statement: >-
      Let V(N,t)=sum_{j=0}^t C(N,j). If
      |R(r,n)| V(2^n,t) < 2^(2^n), then some n-variable Boolean function
      has higher-order nonlinearity strictly greater than t. Equivalently,
      it suffices that V(2^n,t) < 2^(2^n-D), where
      D=sum_{j=0}^r C(n,j).
    formal_status: formalized
    declarations:
