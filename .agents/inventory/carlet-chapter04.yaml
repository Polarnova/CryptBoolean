    kind: lemma
    location: Project bridge for Hou 1996, Theorem 2.3, Case 2a
    statement: >-
      If a six-variable Boolean function f has nonlinearity 28, then for
      every x in V_6 there is an affine function ell at Hamming distance 28
      from f such that (f+ell)(x)=1.
    formal_status: formalized
