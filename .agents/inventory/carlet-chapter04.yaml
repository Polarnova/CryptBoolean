    location: Carlet, p. 63
    statement: >-
      The dimension condition e+d>=n yields g!=0 and h with fg=h,
      deg(g)<=e, and deg(h)<=d. Optimality against fast algebraic attacks is
      the absence of such relations with deg(g)+deg(h)<n.
