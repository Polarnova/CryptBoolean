    kind: definition
    location: Carlet, Definition 3 and footnotes 24--25, pp. 55--56
    statement: >-
      For n>0 and 0<=m<n, f is m-resilient when every restriction obtained
      by fixing at most m coordinates is balanced; it is mth-order
      correlation immune when fixing those inputs leaves the output
      distribution unchanged.
