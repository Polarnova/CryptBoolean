  - id: carlet-4-higher-order-plotkin-induction
    kind: lemma
    location: Project bridge for Carlet, p. 53 and reference [91]
    statement: >-
      Let rho(r,n)=max_f nl_r(f). For 1<=r<=n,
      rho(r,n)<=sum_{j=r}^{n-1} rho(r-1,j). If on that range
      rho(r-1,j)<=2^(j-1)-A*(sqrt(2))^j+e(j), then rho(r,n) is at most
      (2^n-2^r)/2-A*(1+sqrt(2))*((sqrt(2))^n-(sqrt(2))^r)
      +sum_{j=r}^{n-1}e(j).
