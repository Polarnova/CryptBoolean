  - id: carlet-4-rodier-upper-endpoint-reduction
    kind: lemma
    location: Project bridge for Rodier Theorem 3.1; Carlet, p. 51
    statement: >-
      Let tau_n=sqrt(n)*(sqrt(2*ln(2))-5*ln(n)/n)*2^(-n/2). If the uniform
      probability of tau_n being smaller than the normalized Fourier infinity
      norm tends to one, then the probability that nonlinearity is below
      Carlet's displayed upper endpoint tends to one.
    formal_status: formalized
    declarations:
      - CryptBoolean.rodierRandomFourierLowerThreshold
      - CryptBoolean.rodierRandomNonlinearityUpperThreshold
