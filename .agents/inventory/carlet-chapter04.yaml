  - id: carlet-4-reed-muller-coset-distance
    kind: theorem
    location: Carlet, p. 52
    statement: >-
      The nonlinearity of f equals the minimum distance of
      R(1,n) union (f+R(1,n)). More generally, for a family F, the minimum
      distance of union_{f in F}(f+R(1,n)) is the minimum of nl(f+g) over
      distinct f,g in F.
    formal_status: formalized
    declarations:
      - CryptBoolean.minimumHammingDistance
      - CryptBoolean.firstOrderCosetUnion
      - CryptBoolean.firstOrderReedMullerCoset
