      - CryptBoolean.nonlinearity_cast_eq_relation_35
    dependencies:
      - carlet-4-def-nonlinearity
      - carlet-2-def-walsh-transform

  - id: carlet-4-rel-36-covering-radius-bent
    kind: theorem
    location: Carlet, Relation (36), p. 51
    statement: >-
      Every f satisfies nl(f) <= 2^(n-1)-2^(n/2-1). Equality holds exactly
      when |W_f(a)|=2^(n/2) for every a; these functions are bent. A bent
      Boolean function can exist only in even dimension and is not balanced.
    formal_status: formalized
    declarations:
