  - id: carlet-4-rel-35-nonlinearity-walsh
    kind: theorem
    location: Carlet, Relation (35), p. 51
    statement: >-
      For every a, d_H(f, a dot x) = 2^(n-1)-W_f(a)/2 and
      d_H(f, a dot x+1) = 2^(n-1)+W_f(a)/2. Therefore
      nl(f)=2^(n-1)-(1/2) max_a |W_f(a)|.
    formal_status: formalized
    declarations:
      - CryptBoolean.maxWalshMagnitude
      - CryptBoolean.hammingDistance_cast_affineFunction
      - CryptBoolean.bitSignInt_cast
