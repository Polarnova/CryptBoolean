items:
  - id: carlet-4-degree-count
    kind: theorem
    location: Carlet, Section 4.1.1, p. 49
    statement: >-
      For n >= 2, the number of n-variable Boolean functions of algebraic
      degree at most n-2 is 2^(sum_{i=0}^{n-2} C(n,i)) =
      2^(2^n-n-1). Hence a uniformly random n-variable Boolean function has
      degree at least n-1 with probability tending to one.
    formal_status: formalized
    declarations:
      - CryptBoolean.sum_choose_le_n_sub_two
      - CryptBoolean.card_booleanFunctions_degree_le_n_sub_two
      - CryptBoolean.card_booleanFunctions_degree_le_n_sub_two_eq
      - CryptBoolean.natCard_booleanFunction
      - CryptBoolean.highAlgebraicDegreeProbability
      - CryptBoolean.highAlgebraicDegreeProbability_eq_card_ratio
      - CryptBoolean.tendsto_highAlgebraicDegreeProbability
    dependencies:
      - carlet-2-anf-existence-uniqueness
      - carlet-2-def-algebraic-degree

  - id: carlet-4-def-nonlinearity
    kind: definition
    location: Carlet, Section 4.1.2, pp. 49--51
    statement: >-
      The nonlinearity nl(f) of f : V_n -> F_2 is the minimum Hamming
      distance from f to the affine functions x |-> a dot x + b.
    formal_status: formalized
    declarations:
      - CryptBoolean.nonlinearity
    dependencies:
      - carlet-2-def-hamming-distance
      - carlet-2-def-affine-functions

  - id: carlet-4-nonlinearity-affine-invariance
    kind: theorem
    location: Carlet, p. 50
    statement: >-
      For every affine automorphism L of V_n, nl(f composed with L) = nl(f).
    formal_status: formalized
    declarations:
      - CryptBoolean.hammingDistance_comp_affineEquiv
      - CryptBoolean.exists_affineFunction_comp_affineEquiv
      - CryptBoolean.nonlinearity_comp_affineEquiv_le
      - CryptBoolean.nonlinearity_comp_affineEquiv
    dependencies:
