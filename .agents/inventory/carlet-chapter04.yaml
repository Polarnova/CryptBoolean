    kind: lemma
    location: Project bridge for Carlet, p. 53 and reference [91], Relations (9.7)--(9.10)
    statement: >-
      For f : V_n -> F_2 and g in R(2,n), let
      C_f(g)=2^n-2*d_H(f,g) and
      S_k(f)=sum_{g in R(2,n)} C_f(g)^(2k). Then S_k(f)>0 and
      sqrt(S_{k+1}(f)/S_k(f)) <= 2^n-2*nl_2(f). Hence rho(2,n) is at most
      2^(n-1) minus one half of the minimum of this ratio over f.
