  - id: carlet-4-random-nonlinearity-lower-bound
    kind: theorem
    location: Carlet, p. 51
    statement: >-
      As n tends to infinity, the uniform probability that a Boolean function
      has nonlinearity greater than
      2^(n-1)-sqrt(n)*2^((n-1)/2) tends to one.
    formal_status: formalized
    declarations:
