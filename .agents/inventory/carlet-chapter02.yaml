  - id: carlet-2-affine-invariance
    kind: theorem
    location: Carlet, Affine invariance of algebraic degree, p. 12
    statement: >-
      If L : V_n → V_n is an affine isomorphism of the form L(x) = Mx+t with
      M ∈ GL_n(𝔽₂), then deg_alg(f ∘ L) = deg_alg(f) for every
      f : V_n → 𝔽₂.
    formal_status: formalized
    declarations:
      - FABL.anfMonomial_mul
      - FABL.anfMul
      - FABL.anfEval_anfMul
