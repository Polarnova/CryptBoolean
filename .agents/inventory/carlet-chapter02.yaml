      - carlet-2-def-affine-functions

  - id: carlet-2-restriction-recovery
    kind: theorem
    location: Carlet, Recovery from low-weight restrictions, pp. 13--14
    statement: >-
      Let E_d = {y ∈ V_n | w_H(y) ≤ d}. If deg_alg(f) ≤ d < n, then
      f(x) = ⊕_{y ≼ x, y ∈ E_d} f(y)
      [∑_{i=0}^{d-w_H(y)} C(w_H(x)-w_H(y),i) mod 2]. Hence f is
      determined by f|E_d, and by affine invariance the same holds on L(E_d)
      for every affine automorphism L of V_n.
    formal_status: formalized
    declarations:
      - CryptBoolean.supportPrecedes
      - CryptBoolean.supportPrecedesDecidable
      - CryptBoolean.lowWeightInputs
      - CryptBoolean.restrictionRecoveryCoefficient
      - CryptBoolean.card_powerset_filter_card_le
      - CryptBoolean.card_intermediate_subsets_le
      - CryptBoolean.restrictionRecoveryFormula_f₂CubeOfFinset
      - CryptBoolean.restrictionRecoveryFormula
      - CryptBoolean.eq_of_eq_on_lowWeightInputs
      - CryptBoolean.eq_of_eq_on_affineImage_lowWeightInputs
    dependencies:
      - carlet-2-anf-existence-uniqueness
      - carlet-2-affine-invariance
